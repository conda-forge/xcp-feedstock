{% set version = "0.24.2" %}

package:
  name: xcp
  version: {{ version }}

source:
  url: https://github.com/tarka/xcp/archive/v{{ version }}.tar.gz
  sha256: 3fe95dd0e5077c8bf93b606fbb8418a609271c87af77305b4263572b26afaf32

build:
  skip: true  # [win]
  number: 0

requirements:
  build:
    - {{ compiler('rust') }}
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - cargo-bundle-licenses

test:
  commands:
    - xcp --help

about:
  home: https://github.com/tarka/xcp
  dev_url: https://github.com/tarka/xcp
  license: GPL-2.0-or-later
  license_family: GPL
  license_file: COPYING
  summary: An extended cp

extra:
  recipe-maintainers:
    - apcamargo
